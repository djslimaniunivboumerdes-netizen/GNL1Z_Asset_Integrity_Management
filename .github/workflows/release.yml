# ═════════════════════════════════════════════════════════════════════════════
# 5. GITHUB RELEASE  — collects all artifacts and publishes
# ═════════════════════════════════════════════════════════════════════════════
  publish-release:
    name: "🚀 Publish GitHub Release"
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      # Download every artifact built above
      - uses: actions/download-artifact@v4
        with: { name: windows-exe,    path: ./dist-release/ }
      - uses: actions/download-artifact@v4
        with: { name: linux-appimage, path: ./dist-release/ }
      - uses: actions/download-artifact@v4
        with: { name: android-apk,    path: ./dist-release/ }

      # Compute SHA-256 checksums for the security panel on the download page
      - name: Generate checksums
        working-directory: ./dist-release
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "GNL1Z ${{ steps.ver.outputs.tag }} — Sonatrach Arzew"
          body: |
            ## GNL1Z Asset Management ${{ steps.ver.outputs.tag }}
            **Sonatrach GNL1Z — Industrial Asset Management System**

            | Platform | File | Notes |
            |---|---|---|
            | 🤖 Android | `GNL1Z-Android.apk` | Android 7.0+ · Enable Unknown Sources |
            | 🪟 Windows | `GNL1Z-Setup-Windows-x64.exe` | Windows 10/11 x64 |
            | 🐧 Linux | `GNL1Z-Linux-x64.AppImage` | `chmod +x` then run |
            | 🍎 iOS | [TestFlight invite]() | Contact admin for access |
            | 🌐 Web PWA | [Open in browser](https://gnl1z-sonatrach.workers.dev) | Works offline |

            ### Android install
            1. Download `GNL1Z-Android.apk`
            2. Settings → Security → Enable **Unknown Sources** (or **Install Unknown Apps**)
            3. Open the APK and tap Install

            ### Verify file integrity
            ```
            sha256sum -c SHA256SUMS.txt
            ```
          files: |
            ./dist-release/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release All Platforms

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v2.1.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# Shared env
# ─────────────────────────────────────────────────────────────────────────────
env:
  APP_NAME: GNL1Z
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

jobs:

# ═════════════════════════════════════════════════════════════════════════════
# 1. WINDOWS  (.exe NSIS installer)
# ═════════════════════════════════════════════════════════════════════════════
  build-windows:
    name: "🪟 Windows EXE"
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web assets (electron mode — relative base)
        run: bun run build:electron

      - name: Package Windows EXE
        run: bun run electron:pack:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifact
        shell: pwsh
        run: |
          $src = Get-ChildItem release -Filter "*.exe" | Select-Object -First 1
          Rename-Item $src.FullName "GNL1Z-Setup-Windows-x64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/GNL1Z-Setup-Windows-x64.exe
          retention-days: 7

# ═════════════════════════════════════════════════════════════════════════════
# 2. LINUX  (.AppImage)
# ═════════════════════════════════════════════════════════════════════════════
  build-linux:
    name: "🐧 Linux AppImage"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web assets (electron mode)
        run: bun run build:electron

      - name: Package Linux AppImage
        run: bun run electron:pack:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifact
        run: |
          mv release/*.AppImage release/GNL1Z-Linux-x64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/GNL1Z-Linux-x64.AppImage
          retention-days: 7

# ═════════════════════════════════════════════════════════════════════════════
# 3. ANDROID  (.apk via Capacitor + Gradle)
# ═════════════════════════════════════════════════════════════════════════════
  build-android:
    name: "🤖 Android APK"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build the web app normally (NOT electron mode; Capacitor needs /dist with base "/")
      - name: Build web assets
        run: bun run build

      # Capacitor: create the android/ project and sync web assets into it
      - name: Initialise Capacitor Android project
        run: |
          npx cap add android
          npx cap sync android

      # Optional: replace app icon (uses the 512×512 public icon)
      - name: Copy app icons
        run: |
          MIPMAP=android/app/src/main/res
          for size in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p $MIPMAP/mipmap-$size
          done

      # ── Release build (signed) ──────────────────────────────────────────────
      # Set the four secrets below in Settings → Secrets → Actions:
      #   KEYSTORE_BASE64      → base64 of your .jks file
      #   KEYSTORE_PASSWORD    → storePassword
      #   KEY_ALIAS            → keyAlias
      #   KEY_PASSWORD         → keyPassword
      # Generate once:  keytool -genkey -v -keystore gnl1z.jks -alias gnl1z \
      #                   -keyalg RSA -keysize 2048 -validity 10000
      #                 base64 gnl1z.jks | pbcopy

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/gnl1z.jks
          APK=android/app/build/outputs/apk/release/app-release-unsigned.apk
          $JAVA_HOME/bin/jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore /tmp/gnl1z.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass  "${{ secrets.KEY_PASSWORD }}" \
            "$APK" "${{ secrets.KEY_ALIAS }}"
          $JAVA_HOME/bin/java -jar \
            $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -1)/lib/apksigner.jar \
            verify "$APK" || true
          cp "$APK" GNL1Z-Android.apk

      - name: Use debug-signed APK (no signing secrets supplied)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
          cp app/build/outputs/apk/debug/app-debug.apk ../GNL1Z-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: GNL1Z-Android.apk
          retention-days: 7

